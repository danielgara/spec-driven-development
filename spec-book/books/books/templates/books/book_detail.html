{% extends "books/base.html" %}

{% block title %}{{ book.title }} | Book Manager{% endblock %}

{% block content %}
<a class="btn btn-link ps-0" href="{% url 'book-list' %}">&larr; Back to catalog</a>

<article class="card">
    <div class="card-body">
        <h1 class="h3">{{ book.title }}</h1>
        <p class="text-muted mb-2">By {{ book.author }}</p>
        <p><span class="badge text-bg-secondary">{{ book.category }}</span></p>
        <p class="mb-0">{{ book.description|default:"No description available." }}</p>
    </div>
</article>
{% endblock %}
